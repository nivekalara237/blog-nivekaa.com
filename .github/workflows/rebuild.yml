name: rebuild & Deploy Astro after content changed

on:
  repository_dispatch:
    #types: [content-updated, content-created]
    types: [content-updated]

permissions:
  id-token: write
  contents: read

jobs:
  build-project:
    name: Build Project
    runs-on: ubuntu-latest
    environment: clerk
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        run: npm run build
        env:
          PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          PUBLIC_API_URL: ${{ vars.PUBLIC_API_URL }}
          PUBLIC_IMAGE_URL: ${{ vars.PUBLIC_IMAGE_URL }}

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-files-rebuild
          path: dist/
          retention-days: 1

  deploy-to-s3:
    name: Deploy to S3
    needs: build-project
    runs-on: ubuntu-latest
    environment: aws
    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-files-rebuild
          path: dist/

      - name: Configure AWS Account
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          audience: sts.amazonaws.com
          output-env-credentials: true

      - name: Redeploy to S3
        run: aws s3 sync dist/ s3://${{ vars.AWS_S3_BUCKET }} --delete --cache-control "public, max-age=31536000, immutable"
        env:
          AWS_S3_BUCKET: ${{ vars.AWS_S3_BUCKET }}
