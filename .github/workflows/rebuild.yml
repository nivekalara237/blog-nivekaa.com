name: rebuild & Deploy Astro after content changed

on:
  repository_dispatch:
    #types: [content-updated, content-created]
    types: [content-updated]

permissions:
  id-token: write
  contents: read

jobs:
  build-project:
    name: Build Project
    runs-on: ubuntu-latest
    environment: kinde
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install Dependencies
        run: npm ci

      - name: Build Project For DEV
        if: github.event.client_payload.environment == 'dev' || github.event.client_payload.environment == null
        run: npm run build
        env:
          PUBLIC_KINDE_CLIENT_ID: ${{ secrets.KINDE_DEV_CLIENT_ID }}
          PUBLIC_KINDE_DOMAIN: ${{ vars.KINDE_DEV_DOMAIN }}
          PUBLIC_API_URL: ${{ github.event.client_payload.api_url }}
          PUBLIC_IMAGE_URL: ${{ github.event.client_payload.image_api_url }}
          PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.TURNSTILE_SITE_KEY }}

      - name: Build Project For PROD
        if: github.event.client_payload.environment == 'prod'
        run: npm run build
        env:
          PUBLIC_KINDE_CLIENT_ID: ${{ secrets.KINDE_PROD_CLIENT_ID }}
          PUBLIC_KINDE_DOMAIN: ${{ vars.KINDE_PROD_DOMAIN }}
          PUBLIC_API_URL: ${{ github.event.client_payload.api_url }}
          PUBLIC_IMAGE_URL: ${{ github.event.client_payload.image_api_url }}
          PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.TURNSTILE_SITE_KEY }}

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-files-rebuild
          path: dist/
          retention-days: 1

  deploy-to-s3:
    name: Deploy to S3
    needs: build-project
    runs-on: ubuntu-latest
    environment: aws
    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-files-rebuild
          path: dist/

      - name: Configure AWS Account
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          aws-access-key-id: ${{ github.event.client_payload.environment== 'prod' && secrets.PROD_AWS_ACCESS_KEY_ID || secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ github.event.client_payload.environment == 'prod' && secrets.PROD_AWS_SECRET_ACCESS_KEY || secrets.AWS_SECRET_ACCESS_KEY }}
          audience: sts.amazonaws.com
          output-env-credentials: true

      - name: Redeploy to S3
        run: aws s3 sync dist/ s3://${{ env.AWS_S3_BUCKET }} --delete --cache-control "public, max-age=60, immutable"
        env:
          AWS_S3_BUCKET: ${{ github.event.client_payload.environment == 'prod' && 'cloud.nivekaa.com' || 'cloud-dev.nivekaa.com' }}
