name: Build Static and Deploy to S3

on:
  push:
    branches:
      - main
      - feature/**
  workflow_dispatch:
    inputs:
      environment:
        description: "Environnement to deploy"
        required: false
        type: choice
        options:
          - dev
          - prod

permissions:
  contents: read
  id-token: write

jobs:
  build:
    name: Build Website
    runs-on: ubuntu-latest
    environment: kinde
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install Dependencies
        run: npm ci

      - name: Build dev project
        if: inputs.environment == null || inputs.environment == 'dev'
        run: npm run build
        env:
          PUBLIC_KINDE_CLIENT_ID: ${{ secrets.KINDE_DEV_CLIENT_ID }}
          PUBLIC_KINDE_DOMAIN: ${{ vars.KINDE_DEV_DOMAIN }}
          PUBLIC_API_URL: 'https://cloudnive-api-dev.nivekaa.com'
          PUBLIC_IMAGE_URL: 'https://cloudnive-api-dev.nivekaa.com/images'
          PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.TURNSTILE_SITE_KEY }}

      - name: Build prod project
        if: inputs.environment == 'prod'
        run: npm run build
        env:
          PUBLIC_KINDE_CLIENT_ID: ${{ secrets.KINDE_PROD_CLIENT_ID }}
          PUBLIC_KINDE_DOMAIN: ${{ vars.KINDE_PROD_DOMAIN }}
          PUBLIC_API_URL: 'https://cloudnive-api.nivekaa.com'
          PUBLIC_IMAGE_URL: 'https://cloudnive-api.nivekaa.com/images'
          PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.TURNSTILE_SITE_KEY }}

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-files
          path: dist/
          retention-days: 1

  deploy:
    name: Deploy to S3
    needs: build
    runs-on: ubuntu-latest
    environment: aws
    
    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-files
          path: dist/

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}
          audience: sts.amazonaws.com
          output-env-credentials: true

      - name: Deploy to S3
        run: aws s3 sync dist/ s3://${{ env.AWS_S3_BUCKET }} --delete --cache-control "public, max-age=60, immutable"
        env:
          AWS_S3_BUCKET: ${{ inputs.environment == 'prod' && 'cloud.nivekaa.com' || 'cloud-dev.nivekaa.com' }}
