name: Deploy to S3

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build:
    name: Build Website
    runs-on: ubuntu-latest
    environment: kinde
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        run: npm run build
        env:
          PUBLIC_KINDE_CLIENT_ID: ${{ secrets.KINDE_CLIENT_ID }}
          PUBLIC_KINDE_DOMAIN: ${{ vars.KINDE_DOMAIN }}
          # On peut aussi ajouter d'autres variables si nécessaire
          PUBLIC_API_URL: ${{ vars.PUBLIC_API_URL }}
          PUBLIC_IMAGE_URL: ${{ vars.PUBLIC_IMAGE_URL }}

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-files
          path: dist/
          retention-days: 1

  deploy:
    name: Deploy to S3
    needs: build
    runs-on: ubuntu-latest
    environment: aws
    
    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-files
          path: dist/

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}
          audience: sts.amazonaws.com
          output-env-credentials: true

      - name: Deploy to S3
        run: aws s3 sync dist/ s3://${{ vars.AWS_S3_BUCKET }} --delete --cache-control "public, max-age=31536000, immutable"
        env:
          AWS_S3_BUCKET: ${{ vars.AWS_S3_BUCKET }}
