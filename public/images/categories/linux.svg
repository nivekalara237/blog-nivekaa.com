<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <!-- Deep Dark Background -->
  <rect width="800" height="400" fill="#0A0F0A" />
  
  <!-- Subtle scanline / tech grid -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#237227" stroke-width="1" stroke-opacity="0.15" />
    <circle cx="40" cy="40" r="1.5" fill="#519A66" fill-opacity="0.3" />
  </pattern>
  <rect width="800" height="400" fill="url(#grid)" />

  <!-- Outer frame -->
  <rect x="20" y="20" width="760" height="360" fill="none" stroke="#237227" stroke-width="2" stroke-opacity="0.5" />
  <rect x="26" y="26" width="748" height="348" fill="none" stroke="#519A66" stroke-width="1" stroke-opacity="0.2" />

  <!-- Decorative technical marks -->
  <path d="M 20 60 L 30 60 M 20 340 L 30 340 M 780 60 L 770 60 M 780 340 L 770 340" stroke="#FFAA00" stroke-width="2" />
  <path d="M 60 20 L 60 30 M 340 20 L 340 30 M 60 380 L 60 370 M 340 380 L 340 370" stroke="#FFAA00" stroke-width="2" />

  <!-- Giant Background Icon -->
  <g opacity="0.04" transform="matrix(15 0 0 15 480 30)">
    <path fill="none" stroke="#519A66" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
  </g>

  <!-- Tag / Breadcrumb -->
  <rect x="60" y="110" width="80" height="24" fill="#237227" fill-opacity="0.2" stroke="#237227" stroke-width="1" />
  <text x="70" y="126" font-family="monospace" font-size="12" font-weight="bold" fill="#519A66" letter-spacing="1.5">SYS.LOG</text>

  <!-- Main Category Title -->
  <text x="60" y="195" font-family="sans-serif" font-weight="900" font-size="56" fill="#E8F5E8" letter-spacing="-1">
    <tspan fill="#FFAA00">//</tspan> LINUX
  </text>
  
  <!-- Subtitle / Meta -->
  <text x="60" y="240" font-family="monospace" font-size="16" fill="#519A66" letter-spacing="2">
    CLOUDNIVE.COM_DATABASE
  </text>
  
  <!-- "Status" indicator -->
  <circle cx="66" cy="316" r="4" fill="#FFAA00" />
  <text x="80" y="320" font-family="monospace" font-size="12" fill="#888888">STATUS: <tspan fill="#FFAA00">ONLINE</tspan></text>
</svg>